name: Reporte de bug
description: Reporta un comportamiento inesperado
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Gracias por reportar un bug. Por favor completa la información a continuación.

  - type: textarea
    id: description
    attributes:
      label: Descripción
      description: ¿Qué ocurrió y qué esperabas que ocurriera?
      placeholder: Describe el problema...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Pasos para reproducir
      description: Lista los pasos para reproducir el problema
      placeholder: |
        1. Ir a '...'
        2. Hacer clic en '...'
        3. Ver error
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Versión de Node.js
      placeholder: "22.12.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Sistema operativo
      options:
        - Windows
        - macOS
        - Linux
        - Otro
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs o capturas
      description: Añade logs de consola o capturas de pantalla si aplica
