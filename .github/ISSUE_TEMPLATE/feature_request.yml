name: Solicitud de funcionalidad
description: Sugiere una idea o mejora para el proyecto
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Gracias por proponer una mejora. Describe tu idea con el mayor detalle posible.

  - type: textarea
    id: problem
    attributes:
      label: Problema o necesidad
      description: ¿Qué problema resuelve esta funcionalidad?
      placeholder: Me frustra cuando...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Solución propuesta
      description: ¿Cómo te gustaría que funcionara?
      placeholder: Sería útil si...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternativas consideradas
      description: ¿Has pensado en otras formas de resolverlo?
